# ============================================
# CODEHERWAY — Netlify Configuration
# ============================================

[build]
  # No build command needed — pure static HTML/CSS/JS
  publish = "/"

# ── Pretty URLs ──
# /blog.html → /blog  (Netlify handles this automatically)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# ── Custom 404 ──
# Create a 404.html in root and Netlify will serve it automatically

# ── Asset Caching ──
# CSS, JS, images get cached for 1 year (they're versioned by content)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages — don't cache (so deploys show up instantly)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Security Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
